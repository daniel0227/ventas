<!-- core/templates/core/home.html -->
<!DOCTYPE html>
<html lang="es">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <title>Lottia</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <!-- Favicon -->
    <link rel="icon" href="{% static 'core/img/icons/google-tag-manager.svg' %}" />
    
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Notyf -->
    <link
      type="text/css"
      href="{% static 'core/vendor/notyf/notyf.min.css' %}"
      rel="stylesheet"
    />

    <!-- Volt CSS -->
    <link
      type="text/css"
      href="{% static 'core/css/volt.css' %}"
      rel="stylesheet"
    />

    <!-- NOTICE: You can use the _analytics.html partial to include production code specific code & trackers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  </head>
  <body>

    <main class="content">
        <!-- Contenedor de bienvenida -->
        <!-- Se asume que ya tienes Bootstrap 5 y Bootstrap Icons incluidos en tu plantilla base -->
<!-- Ejemplo de uso de Bootstrap 5 y Bootstrap Icons -->

      <div class="welcome-container d-flex justify-content-between align-items-center p-3 shadow-sm" style="margin-top: 3%; background-color: #fff; border-radius: 8px;">
        <!-- Texto de bienvenida con un emoji -->
        <h5 class="m-0" style="font-weight: 600; color: #333; font-size: 16px;">
          Bienvenido, {{ user.username }} 
          <span role="img" aria-label="wave">👋</span>
        </h5>

        <!-- Contenedor de botones -->
        <div class="btn-container d-flex gap-2 align-items-center">
          <!-- Botón Inicio con ícono de Bootstrap Icons -->
          <a href="{% url 'home' %}" class="btn btn-outline-primary d-flex align-items-center fw-semibold">
            <i class="bi bi-house me-1"></i>
            Inicio
          </a>

          <!-- Campana de notificaciones -->
          <div class="dropdown notif-bell-wrapper" title="Notificaciones">
            <button id="notifBellBtn" class="btn btn-outline-secondary notif-bell-btn position-relative"
                    type="button" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Notificaciones">
              <i class="bi bi-bell"></i>
              <span id="notifBadge" class="notif-badge d-none">0</span>
            </button>
            <div class="dropdown-menu dropdown-menu-end notif-dropdown p-0" id="notifDropdown">
              <div class="notif-header d-flex justify-content-between align-items-center px-3 py-2 border-bottom">
                <span class="fw-bold" style="font-size:.85rem;">Notificaciones</span>
                <span id="notifHeaderCount" class="badge bg-primary rounded-pill" style="font-size:.7rem;"></span>
              </div>
              <div id="notifList" style="max-height:320px; overflow-y:auto;">
                <div class="text-center text-muted py-4" style="font-size:.82rem;">
                  <i class="bi bi-bell-slash me-1"></i> Sin notificaciones
                </div>
              </div>
            </div>
          </div>

          <!-- Botón Salir con ícono de Bootstrap Icons -->
          <form method="post" action="{% url 'logout' %}" class="d-inline">
            {% csrf_token %}
            <button class="btn btn-outline-danger d-flex align-items-center fw-semibold" type="submit">
              <i class="bi bi-box-arrow-right me-1"></i>
              Salir
            </button>
          </form>
        </div>
      </div>
      <br>

      {% block breadcrumbs %}{% endblock %}

      {% block content %}

      {% endblock %}
    </main>
    

  </body>
  <style>
    .btn {
      line-height: 1;
      padding: 0.5rem 0.8rem;
    }
    /* ── Campana de notificaciones ───────────────── */
    .notif-bell-btn { padding: .4rem .65rem; border-radius: 8px; }
    .notif-badge {
      position: absolute; top: 2px; right: 2px;
      background: #ef4444; color: #fff; font-size: .6rem; font-weight: 700;
      border-radius: 999px; min-width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; padding: 0 3px;
    }
    .notif-dropdown { width: 320px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,.12); border: 1px solid #e5e7eb; }
    .notif-item { padding: .65rem 1rem; border-bottom: 1px solid #f3f4f6; cursor: default; transition: background .15s; }
    .notif-item:last-child { border-bottom: 0; }
    .notif-item:hover { background: #f9fafb; }
    .notif-item.no-leida { background: #f0f4ff; }
    .notif-item .notif-title { font-size: .82rem; font-weight: 600; color: #1f2937; margin-bottom: .15rem; }
    .notif-item .notif-msg { font-size: .76rem; color: #6b7280; margin: 0; }
    .notif-item .notif-time { font-size: .7rem; color: #9ca3af; margin-top: .2rem; }
    .notif-dot-info    { color: #3b82f6; }
    .notif-dot-exito   { color: #10b981; }
    .notif-dot-alerta  { color: #f59e0b; }
    .notif-dot-error   { color: #ef4444; }
    /* ── Breadcrumbs ─────────────────────────────── */
    .breadcrumb-lottia {
      display: flex;
      align-items: center;
      gap: .35rem;
      flex-wrap: wrap;
      font-size: .78rem;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: .85rem;
      padding: .4rem 0;
    }
    .breadcrumb-lottia a {
      color: #6b7280;
      text-decoration: none;
      transition: color .15s;
    }
    .breadcrumb-lottia a:hover { color: #4f46e5; }
    .breadcrumb-lottia .sep { color: #d1d5db; font-size: .7rem; }
    .breadcrumb-lottia .current { color: #1f2937; font-weight: 600; }
  </style>
  
    <!-- Core -->
    <script src="{% static 'core/vendor/@popperjs/core/dist/umd/popper.min.js' %}"></script>
    <script src="{% static 'core/vendor/bootstrap/dist/js/bootstrap.min.js' %}"></script>

    <!-- Vendor JS -->
    <script src="{% static 'core/vendor/onscreen/dist/on-screen.umd.min.js' %}"></script>

    <!-- Slider -->
    <script src="{% static 'core/vendor/nouislider/dist/nouislider.min.js' %}"></script>

    <!-- Smooth scroll -->
    <script src="{% static 'core/vendor/smooth-scroll/dist/smooth-scroll.polyfills.min.js' %}"></script>

    <!-- Charts -->
    <script src="{% static 'core/vendor/chartist/dist/chartist.min.js' %}"></script>
    <script src="{% static 'core/vendor/chartist-plugin-tooltips/dist/chartist-plugin-tooltip.min.js' %}"></script>

    <!-- Datepicker -->
    <script src="{% static 'core/vendor/vanillajs-datepicker/dist/js/datepicker.min.js' %}"></script>

    <!-- Moment JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.27.0/moment.min.js"></script>

    <!-- Vanilla JS Datepicker -->
    <script src="{% static 'core/vendor/vanillajs-datepicker/dist/js/datepicker.min.js' %}"></script>

    <!-- Notyf -->
    <script src="{% static 'core/vendor/notyf/notyf.min.js' %}"></script>

    <!-- Simplebar -->
    <script src="{% static 'core/vendor/simplebar/dist/simplebar.min.js' %}"></script>

    <!-- Github buttons -->
    <script async defer src="https://buttons.github.io/buttons.js"></script>

    <!-- Volt JS -->
    <script src="{% static 'core/js/volt.js' %}"></script>

    <!-- Notificaciones en-app -->
    <script>
    (function () {
      const POLL_MS = 60000; // cada 60 segundos
      const countUrl = "{% url 'notificaciones_count' %}";
      const listUrl  = "{% url 'notificaciones_list' %}";
      const badge    = document.getElementById('notifBadge');
      const btn      = document.getElementById('notifBellBtn');
      const listEl   = document.getElementById('notifList');
      const headerCount = document.getElementById('notifHeaderCount');
      let pollTimer = null;

      const tipoIcon = { info: 'bi-info-circle', exito: 'bi-check-circle', alerta: 'bi-exclamation-triangle', error: 'bi-x-circle' };
      const tipoClass = { info: 'notif-dot-info', exito: 'notif-dot-exito', alerta: 'notif-dot-alerta', error: 'notif-dot-error' };

      function fmtDate(iso) {
        try {
          return new Date(iso).toLocaleString('es-CO', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
        } catch { return iso; }
      }

      function updateBadge(count) {
        if (count > 0) {
          badge.textContent = count > 99 ? '99+' : count;
          badge.classList.remove('d-none');
        } else {
          badge.classList.add('d-none');
        }
      }

      function pollCount() {
        fetch(countUrl, { credentials: 'same-origin' })
          .then(r => r.ok ? r.json() : null)
          .then(d => d && updateBadge(d.count))
          .catch(() => {});
      }

      function renderList(notifs) {
        if (!notifs.length) {
          listEl.innerHTML = '<div class="text-center text-muted py-4" style="font-size:.82rem;"><i class="bi bi-bell-slash me-1"></i> Sin notificaciones</div>';
          headerCount.textContent = '';
          return;
        }
        const noLeidas = notifs.filter(n => !n.leida).length;
        headerCount.textContent = noLeidas ? noLeidas : '';
        listEl.innerHTML = notifs.map(n => {
          const icon = tipoIcon[n.tipo] || 'bi-bell';
          const cls  = tipoClass[n.tipo] || '';
          const wrap = n.url ? `<a href="${n.url}" style="text-decoration:none;color:inherit;">` : '<div>';
          const end  = n.url ? '</a>' : '</div>';
          return `${wrap}<div class="notif-item${n.leida ? '' : ' no-leida'}">
            <div class="notif-title"><i class="bi ${icon} me-1 ${cls}"></i>${n.titulo}</div>
            ${n.mensaje ? `<p class="notif-msg">${n.mensaje}</p>` : ''}
            <div class="notif-time">${fmtDate(n.creada_en)}</div>
          </div>${end}`;
        }).join('');
      }

      // Al abrir el dropdown: cargar lista y marcar como leídas
      if (btn) {
        btn.addEventListener('shown.bs.dropdown', () => {
          clearInterval(pollTimer);
          fetch(listUrl, { credentials: 'same-origin' })
            .then(r => r.ok ? r.json() : null)
            .then(d => { if (d) { renderList(d.notificaciones); updateBadge(0); } })
            .catch(() => {});
        });
        btn.addEventListener('hidden.bs.dropdown', () => {
          pollTimer = setInterval(pollCount, POLL_MS);
        });
      }

      // Polling inicial
      pollCount();
      pollTimer = setInterval(pollCount, POLL_MS);
    })();
    </script>

</html>
