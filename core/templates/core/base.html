<!-- core/templates/core/home.html -->
<!DOCTYPE html>
<html lang="es">
  {% load static %}
  <head>
    <meta charset="UTF-8" />
    <title>Lottia</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <!-- Favicon -->
    <link rel="icon" href="{% static 'core/img/icons/google-tag-manager.svg' %}" />
    
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="theme-color" content="#ffffff" />

    <!-- Notyf -->
    <link
      type="text/css"
      href="{% static 'core/vendor/notyf/notyf.min.css' %}"
      rel="stylesheet"
    />

    <!-- Volt CSS -->
    <link
      type="text/css"
      href="{% static 'core/css/volt.css' %}"
      rel="stylesheet"
    />

    <!-- NOTICE: You can use the _analytics.html partial to include production code specific code & trackers -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    {% block extra_css %}{% endblock %}
  </head>
  <body>

    <main class="content">
        <!-- Contenedor de bienvenida -->
        <!-- Se asume que ya tienes Bootstrap 5 y Bootstrap Icons incluidos en tu plantilla base -->
<!-- Ejemplo de uso de Bootstrap 5 y Bootstrap Icons -->

      <div class="welcome-container d-flex justify-content-between align-items-center p-3 shadow-sm">
        <h5 class="welcome-greeting m-0">
          Bienvenido, {{ user.username }}
          <span role="img" aria-label="Saludo">👋</span>
        </h5>

        <div class="btn-container d-flex gap-2">
          <a href="{% url 'home' %}" class="btn btn-outline-primary welcome-btn d-flex align-items-center fw-semibold" aria-label="Ir al inicio">
            <i class="bi bi-house"></i>
            <span class="welcome-btn-text ms-1">Inicio</span>
          </a>
          <form method="post" action="{% url 'logout' %}" class="d-inline" data-no-loading>
            {% csrf_token %}
            <button class="btn btn-outline-danger welcome-btn d-flex align-items-center fw-semibold" type="submit" aria-label="Cerrar sesión">
              <i class="bi bi-box-arrow-right"></i>
              <span class="welcome-btn-text ms-1">Salir</span>
            </button>
          </form>
        </div>
      </div>

      {% block content %}

      {% endblock %}

      <!-- Overlay global de carga -->
      <div class="lottia-loading" id="lottia-loading" role="status" aria-live="polite" aria-hidden="true">
        <div class="ll-box">
          <div class="ll-spinner"></div>
          <span class="ll-text">Cargando…</span>
        </div>
      </div>
    </main>
    

  </body>
  <style>
    .welcome-container {
      margin-top: 1.25rem;
      margin-bottom: 1rem;
      background-color: #fff;
      border-radius: 10px;
    }

    .welcome-greeting {
      font-weight: 600;
      color: #1f2937;
      font-size: 1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 55%;
    }

    .welcome-btn {
      min-height: 40px;
      font-size: 0.95rem;
      touch-action: manipulation;
    }

    @media (max-width: 399.98px) {
      .welcome-btn-text {
        display: none;
      }

      .welcome-btn {
        min-width: 44px;
        min-height: 44px;
        justify-content: center;
        padding: 0.5rem 0.75rem;
      }

      .welcome-greeting {
        font-size: 0.92rem;
        max-width: 50%;
      }
    }

    .btn {
      line-height: 1;
      padding: 0.5rem 0.8rem;
    }

    /* Overlay global de carga (filtros, reportes y exportaciones) */
    .lottia-loading {
      position: fixed; inset: 0; z-index: 1080;
      background: rgba(15, 23, 42, .38);
      display: none; align-items: center; justify-content: center;
    }
    .lottia-loading.show { display: flex; }
    .lottia-loading .ll-box {
      display: flex; flex-direction: column; align-items: center; gap: .65rem;
      background: #fff; border-radius: 14px;
      padding: 1.15rem 1.6rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, .25);
    }
    .lottia-loading .ll-spinner {
      width: 36px; height: 36px; border-radius: 50%;
      border: 4px solid #e0e7ff; border-top-color: #4f46e5;
      animation: ll-spin .7s linear infinite;
    }
    .lottia-loading .ll-text {
      font-size: .82rem; font-weight: 700; color: #475569;
    }
    @keyframes ll-spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .lottia-loading .ll-spinner { animation-duration: 1.5s; }
    }
  </style>
  
    <!-- Core -->
    <script src="{% static 'core/vendor/@popperjs/core/dist/umd/popper.min.js' %}"></script>
    <script src="{% static 'core/vendor/bootstrap/dist/js/bootstrap.min.js' %}"></script>

    <!-- Vendor JS -->
    <script src="{% static 'core/vendor/onscreen/dist/on-screen.umd.min.js' %}"></script>

    <!-- Slider -->
    <script src="{% static 'core/vendor/nouislider/dist/nouislider.min.js' %}"></script>

    <!-- Smooth scroll -->
    <script src="{% static 'core/vendor/smooth-scroll/dist/smooth-scroll.polyfills.min.js' %}"></script>

    <!-- Charts -->
    <script src="{% static 'core/vendor/chartist/dist/chartist.min.js' %}"></script>
    <script src="{% static 'core/vendor/chartist-plugin-tooltips/dist/chartist-plugin-tooltip.min.js' %}"></script>

    <!-- Datepicker -->
    <script src="{% static 'core/vendor/vanillajs-datepicker/dist/js/datepicker.min.js' %}"></script>

    <!-- Moment JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.27.0/moment.min.js"></script>

    <!-- Vanilla JS Datepicker -->
    <script src="{% static 'core/vendor/vanillajs-datepicker/dist/js/datepicker.min.js' %}"></script>

    <!-- Notyf -->
    <script src="{% static 'core/vendor/notyf/notyf.min.js' %}"></script>

    <!-- Simplebar -->
    <script src="{% static 'core/vendor/simplebar/dist/simplebar.min.js' %}"></script>

    <!-- Github buttons -->
    <script async defer src="https://buttons.github.io/buttons.js"></script>

    <!-- Volt JS -->
    <script src="{% static 'core/js/volt.js' %}"></script>

    <!-- Overlay de carga global -->
    <script>
    (function () {
      var overlay = document.getElementById('lottia-loading');
      if (!overlay) return;
      var textEl = overlay.querySelector('.ll-text');
      var timer = null;

      function show(msg, autoHide) {
        if (textEl) textEl.textContent = msg || 'Cargando…';
        overlay.classList.add('show');
        overlay.setAttribute('aria-hidden', 'false');
        if (timer) clearTimeout(timer);
        timer = setTimeout(hide, autoHide || 15000);
      }
      function hide() {
        overlay.classList.remove('show');
        overlay.setAttribute('aria-hidden', 'true');
        if (timer) { clearTimeout(timer); timer = null; }
      }
      window.LottiaLoading = { show: show, hide: hide };

      // 1) Envíos reales (botón Filtrar/Ver/Guardar o Enter). Si un handler de
      //    la página cancela el envío (validación o AJAX), no mostramos nada.
      document.addEventListener('submit', function (e) {
        if (e.defaultPrevented) return;
        var f = e.target;
        if (!f || f.tagName !== 'FORM') return;
        if (f.hasAttribute('data-no-loading') || f.target === '_blank') return;
        show(f.getAttribute('data-loading-text'));
      }, false);

      // 2) Envíos por JS: form.submit() no dispara el evento 'submit'.
      if (window.HTMLFormElement && HTMLFormElement.prototype.submit) {
        var nativeSubmit = HTMLFormElement.prototype.submit;
        HTMLFormElement.prototype.submit = function () {
          if (!this.hasAttribute('data-no-loading') && this.target !== '_blank') {
            show(this.getAttribute('data-loading-text'));
          }
          return nativeSubmit.apply(this, arguments);
        };
      }

      // 3) Enlaces de exportación/descarga: la página no navega -> auto-ocultar.
      document.addEventListener('click', function (e) {
        var a = e.target.closest ? e.target.closest('a') : null;
        if (!a) return;
        var href = a.getAttribute('href') || '';
        if (a.hasAttribute('download') || /[?&](export|formato)=/.test(href)) {
          show('Generando archivo…', 3000);
        } else if (a.hasAttribute('data-loading')) {
          show(a.getAttribute('data-loading-text'));
        }
      }, false);

      // 4) Al volver con el botón atrás (bfcache) nunca dejar el overlay puesto.
      window.addEventListener('pageshow', hide);
    })();
    </script>

</html>
